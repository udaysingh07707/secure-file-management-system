<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container">

  <!-- LEFT: FORM -->
  <div class="left">
    <div class="form-box">
      <h2>Welcome Back 👋</h2>
      <p>Sign in to continue</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" placeholder="example@email.com" required />

        <label>Password</label>
        <input type="password" placeholder="At least 8 characters" required />

        <a href="#" class="forgot">Forgot Password?</a>

        <button type="submit">Sign In</button>
      </form>

      <div class="divider">OR</div>

      <button class="google">Sign in with Google</button>
      <button class="facebook">Sign in with Facebook</button>

      <p class="signup">
        Don’t have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>

  <!-- RIGHT: IMAGE -->
  <div class="right">
    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9" alt="bg">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
